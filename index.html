<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 커피 주문</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #8B1A1A;
      --bg: #fdf5f0;
      --card: #ffffff;
      --border: #e8d5c8;
      --text: #2c1a1a;
      --muted: #8a6a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    header h1 { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .cafe-tabs { display: flex; gap: 5px; }
    .cafe-tab {
      padding: 4px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #b08080;
      transition: all 0.15s;
    }
    .cafe-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .cafe-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    .conn-info { font-size: 11px; color: #b08080; }

    /* 페이지 탭 네비게이션 */
    .page-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 0;
      position: sticky;
      top: 73px;
      z-index: 99;
    }
    .page-tab {
      flex: 1;
      max-width: 160px;
      padding: 11px 0;
      border: none;
      border-bottom: 2.5px solid transparent;
      background: transparent;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .page-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* 주간 탭 */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .week-label { font-size: 13px; font-weight: 700; color: var(--text); }
    .week-nav-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 4px 10px; cursor: pointer; font-size: 12px; color: var(--muted);
      transition: all 0.15s;
    }
    .week-nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .day-tabs { display: flex; gap: 5px; }
    .day-tab {
      flex: 1; padding: 7px 2px; border-radius: 10px;
      border: 1.5px solid var(--border); background: transparent;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .day-tab .day-dow { font-size: 10px; font-weight: 700; color: var(--muted); }
    .day-tab .day-num { font-size: 15px; font-weight: 700; color: var(--text); margin: 2px 0; }
    .day-tab .day-holi { font-size: 8px; color: #c0504d; line-height: 1.2; }
    .day-tab.today { border-color: #c0a090; }
    .day-tab.today .day-num { color: var(--primary); }
    .day-tab.active { background: var(--primary); border-color: var(--primary); }
    .day-tab.active .day-dow,
    .day-tab.active .day-num,
    .day-tab.active .day-holi { color: white !important; }
    .day-tab.holiday {
      opacity: 0.45;
      background: #f0ebe8;
      border-color: #e0d0c8;
      cursor: not-allowed;
    }
    .day-tab.holiday .day-num { color: #c0504d; }

    /* 점심 선택 */
    #lunchOpts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .lunch-opt-btn {
      padding: 11px 8px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      text-align: center;
      transition: all 0.15s;
    }
    .lunch-opt-full { grid-column: 1 / -1; text-align: center; }
    .lunch-opt-btn:hover:not(.on) { border-color: var(--primary); color: var(--primary); }
    .lunch-opt-btn.on { background: var(--primary); border-color: var(--primary); color: white; font-weight: 700; }

    .lunch-result-row { padding: 9px 0; border-bottom: 1px solid #f0e8e0; }
    .lunch-result-row:last-child { border-bottom: none; }
    .lunch-result-label { font-size: 14px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .lunch-count { font-size: 11px; color: var(--muted); font-weight: 400; }
    .lunch-result-names { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .lunch-name-tag {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px 6px 3px 9px;
      background: #f5e8e0;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }
    .lunch-name-tag button {
      background: none; border: none;
      color: #c0a090; cursor: pointer;
      font-size: 14px; padding: 0; line-height: 1; margin-left: 1px;
    }
    .lunch-name-tag button:hover { color: var(--primary); }

    .container { max-width: 480px; margin: 0 auto; padding: 14px 14px 0; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Name input */
    .name-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }
    .name-btn {
      padding: 7px 4px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: #fafafa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .name-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff5f0; }
    .name-btn.selected { background: var(--primary); border-color: var(--primary); color: white; }
    .name-btn.ordered { border-color: #c0786a; background: #fff0ec; color: var(--primary); }
    .ordered-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: -0.2px;
      opacity: 0.85;
    }

    /* Tabs */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tab {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .tab.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* Menu items */
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s;
      margin: 0 -10px;
    }
    .menu-item:hover { background: #fdf0eb; }
    .menu-item.selected { background: #fbe8e0; }
    .item-left { flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .star-icon { color: var(--primary); font-size: 11px; }
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 9px;
      background: #f0e4dc;
      color: var(--muted);
      font-weight: 600;
    }
    .item-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .item-price { font-size: 14px; font-weight: 700; color: var(--primary); white-space: nowrap; }

    /* Options */
    .opt-group { margin-bottom: 14px; }
    .opt-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 7px; text-transform: uppercase; }
    .opt-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .opt-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .opt-btn.on { background: var(--primary); border-color: var(--primary); color: white; }
    .opt-btn.extra.on { background: #5c3d2e; border-color: #5c3d2e; color: white; }

    /* Buttons */
    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.88; }

    /* Order list */
    .order-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid #f0e8e0;
      gap: 8px;
    }
    .order-item:last-child { border-bottom: none; }
    .order-who { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .order-drink { font-size: 14px; font-weight: 500; }
    .order-opts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .order-right { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .order-price { font-size: 14px; font-weight: 700; }
    .btn-del {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 17px;
      padding: 0 0 0 4px;
      line-height: 1;
      transition: color 0.12s;
    }
    .btn-del:hover { color: var(--primary); }

    .name-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .name-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px 3px 10px;
      background: #f5e8e0;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
    }
    .name-tag button {
      background: none;
      border: none;
      color: #c0a090;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      margin-left: 1px;
    }
    .name-tag button:hover { color: var(--primary); }
    .order-count {
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: var(--primary);
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 4px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 6px;
      border-top: 2px solid var(--border);
      font-weight: 700;
      font-size: 16px;
    }
    .total-count { font-size: 12px; color: var(--muted); font-weight: 400; }

    .btn-copy {
      width: 100%;
      padding: 13px;
      background: #4a3728;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-reset {
      width: 100%;
      padding: 10px;
      background: none;
      color: #b08080;
      border: 1.5px solid #e8d5c8;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--primary); color: var(--primary); }
    .conn-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 4px;
      vertical-align: middle;
    }
    .conn-dot.on { background: #4caf50; }

    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 18px 0; }

    .history-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .history-toggle .arrow { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
    .history-toggle .arrow.open { transform: rotate(180deg); }

    .history-entry {
      border-bottom: 1px solid #f0e8e0;
    }
    .history-entry:last-child { border-bottom: none; }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      cursor: pointer;
      user-select: none;
    }
    .history-header:hover .history-date { color: #a03030; }
    .history-date { font-size: 13px; font-weight: 700; color: var(--primary); transition: color 0.12s; }
    .history-arrow { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
    .history-arrow.open { transform: rotate(180deg); }
    .history-body { padding-bottom: 10px; }
    .history-order { font-size: 13px; margin-bottom: 2px; }
    .history-names { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .btn-copy-hist {
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      color: var(--muted);
      margin-top: 4px;
      transition: all 0.15s;
    }
    .btn-copy-hist:hover { border-color: var(--primary); color: var(--primary); }

    /* 이미지 첨부 버튼 */
    .lunch-opt-img-btn {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      cursor: pointer;
    }
    .lunch-opt-img-btn.on {
      background: var(--card) !important;
      border-color: var(--primary);
      border-width: 2.5px;
    }
    .lunch-opt-img-btn.on .opt-name { color: var(--primary); font-weight: 700; }
    .opt-img-area {
      width: 100%;
      height: 76px;
      background: #f5ebe5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .opt-img { width: 100%; height: 100%; object-fit: cover; }
    .opt-plus-icon { font-size: 22px; color: #c0a090; }
    .opt-name { padding: 7px 6px; font-size: 13px; font-weight: 600; color: var(--text); text-align: center; }
    .opt-img-action-btn {
      position: absolute;
      top: 5px; right: 5px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.1);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; padding: 0; color: #555; line-height: 1;
    }
    .opt-img-action-btn:hover { background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .opt-view-btn {
      display: block;
      width: 100%;
      padding: 4px 0;
      background: none;
      border: none;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
    }
    .opt-view-btn:hover { color: var(--primary); }

    /* 라이트박스 */
    #imgLightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #imgLightbox.open { display: flex; }
    #lightboxImg {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #lightboxClose {
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightboxClose:hover { background: rgba(255,255,255,0.35); }

    /* 이미지 팝업 메뉴 */
    #imgMenu {
      display: none;
      position: fixed;
      z-index: 300;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      overflow: hidden;
      min-width: 170px;
    }
    .img-menu-item {
      display: block; width: 100%;
      padding: 12px 18px; border: none; background: none;
      font-size: 14px; cursor: pointer; text-align: left;
      font-family: inherit; color: var(--text); transition: background 0.12s;
    }
    .img-menu-item:hover { background: #fdf0eb; }
    .img-menu-item + .img-menu-item { border-top: 1px solid #f0e8e0; }

    .lunch-note-input {
      grid-column: 1 / -1;
      width: 100%;
      margin-top: 0;
      margin-bottom: 0;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fdf0eb;
      outline: none;
      transition: border-color 0.15s;
    }
    .lunch-note-input:focus { border-color: var(--primary); background: #fff5f0; }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(44,26,26,0.88);
      color: white;
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>☕ SI 팀</h1>
  <div class="header-bottom">
    <span class="conn-info"><span class="conn-dot" id="connDot"></span><span id="connStatus">연결 중...</span></span>
  </div>
</header>

<nav class="page-nav">
  <button class="page-tab active" data-page="lunch"  onclick="switchPage('lunch')">🍱 점심 선택</button>
  <button class="page-tab"        data-page="coffee" onclick="switchPage('coffee')">☕ 커피 주문</button>
</nav>

<!-- ☕ 커피 주문 페이지 -->
<div id="page-coffee" class="container" style="display:none">

  <!-- 카페 선택 -->
  <div class="card" style="padding-bottom:12px">
    <div class="cafe-tabs" id="cafeTabs"></div>
  </div>

  <!-- 이름 -->
  <div class="card">
    <div class="card-title">주문자 선택</div>
    <div class="name-grid" id="nameGrid"></div>
  </div>

  <!-- 메뉴 -->
  <div class="card">
    <div class="card-title">메뉴 선택</div>
    <div class="tabs" id="tabs"></div>
    <div id="menuList"></div>
  </div>

  <!-- 옵션 -->
  <div class="card" id="optCard" style="display:none">
    <div class="card-title">옵션</div>
    <div id="optGroups"></div>
    <button class="btn-add" onclick="addOrder()">주문 추가하기</button>
  </div>

  <!-- 주문 목록 -->
  <div class="card">
    <div class="card-title">주문 목록</div>
    <div id="orderList"><div class="empty">아직 주문이 없어요</div></div>
    <div id="totalRow" style="display:none" class="total-row">
      <span>합계 <span class="total-count" id="totalCount"></span></span>
      <span id="totalAmt"></span>
    </div>
    <button class="btn-copy" id="btnCopy" style="display:none" onclick="copyOrders()">📋 주문 내역 복사하기</button>
    <button class="btn-reset" id="btnReset" style="display:none" onclick="resetOrders()">🗑️ 주문 초기화</button>
  </div>

  <!-- 과거 주문내역 -->
  <div class="card">
    <div class="history-toggle" onclick="toggleHistory()">
      <div class="card-title" style="margin-bottom:0">과거 주문내역 조회</div>
      <span class="arrow" id="histArrow">▼</span>
    </div>
    <div id="historyList" style="display:none;margin-top:12px">
      <div class="empty">조회된 내역이 없어요</div>
    </div>
  </div>

</div>
<!-- /☕ 커피 주문 페이지 -->

<!-- 🍱 점심 선택 페이지 -->
<div id="page-lunch" class="container" style="display:none">

  <!-- 주간 탭 -->
  <div class="card" style="padding-bottom:12px">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">◀</button>

const TEMP_FREE = new Set(["COLD BREW","ADE"]);

const PEOPLE = [

const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 연결 상태 표시
db.ref('.info/connected').on('value', snap => {
  const on = snap.val();
  document.getElementById('connDot').className     = 'conn-dot' + (on ? ' on' : '');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const CAFE_LIST = Object.keys(MENUS); // ['소소', ...]
let currentCafe = CAFE_LIST[0];
function getMenu() { return MENUS[currentCafe]; }
function getLsKey() { return `si-coffee-orders-${currentCafe}`; }

let orderRef   = db.ref(`si-coffee/${currentCafe}/orders`);
let historyRef = db.ref(`si-coffee/${currentCafe}/history`);

// ─── 구버전 opts 텍스트 정규화 ───
function normalizeOrders(arr) {
  return arr.map(o => ({
    ...o,
    opts: (o.opts || '')
      .replace(/디카페인 변경/g, '디카페인')
      .replace(/오트밀 변경/g,   '오트밀'),
  }));
}

// ─── localStorage 캐시 (오프라인 대비) ───
function saveLocal() {
  try { localStorage.setItem(getLsKey(), JSON.stringify(orders)); } catch(e) {}
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(getLsKey());
    if (raw) { orders = normalizeOrders(JSON.parse(raw)); renderOrders(); }
  } catch(e) {}
}
function clearLocal() {
  try { localStorage.removeItem(getLsKey()); } catch(e) {}
}
// ─────────────────────────────────────────

function attachOrderListener() {
  orderRef.on('value', snap => {
    const val = snap.val();
    try { orders = normalizeOrders(val && val.json ? JSON.parse(val.json) : []); }
    catch(e) { orders = []; }
    saveLocal();
    renderOrders();
  });
}

function saveOrders() {
  saveLocal();
  if (!orders.length) { orderRef.remove(); return; }
  orderRef.set({ json: JSON.stringify(orders), ts: Date.now() });
}

function resetOrders() {
  if (!confirm('주문 내역을 전체 초기화할까요?')) return;
  if (orders.length > 0) {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    historyRef.push({ date: dateStr, orders: JSON.parse(JSON.stringify(orders)) });
  }
  orders = [];
  clearLocal();
  orderRef.remove();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let cats = Object.keys(getMenu());
let cat  = cats[0];
let selectedName = null;
let sel = null, temp = null, size = null, bean = null, extras = [];
let orders = [];

function init() {
  loadLocal();
  attachOrderListener();
  renderCafeTabs();
  renderNameGrid();
  renderTabs();
  renderMenu();
  switchPage('lunch'); // 기본 페이지: 점심 선택
}

function renderCafeTabs() {
  document.getElementById('cafeTabs').innerHTML = CAFE_LIST.map(c =>
    `<button class="cafe-tab ${c === currentCafe ? 'active' : ''}" onclick="switchCafe('${c}')">${c}</button>`
  ).join('');
}

function switchCafe(name) {
  if (name === currentCafe) return;
  orderRef.off();                              // 기존 리스너 해제
  currentCafe = name;
  cats = Object.keys(getMenu());
  cat  = cats[0];
  orderRef   = db.ref(`si-coffee/${currentCafe}/orders`);
  historyRef = db.ref(`si-coffee/${currentCafe}/history`);
  orders = [];
  sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  loadLocal();
  attachOrderListener();
  renderCafeTabs();
  renderNameGrid();
  renderTabs();
  renderMenu();
}

function renderNameGrid() {
  document.getElementById('nameGrid').innerHTML = PEOPLE.map(n => {
    const ordered = orders.some(o => o.names.includes(n));
    const cls = [n === selectedName ? 'selected' : '', ordered ? 'ordered' : ''].join(' ');
    return `<button class="name-btn ${cls}" onclick="pickName('${n}')">${n}${ordered ? '<span class="ordered-label">✓ 주문완료</span>' : ''}</button>`;
  }).join('');
}

function pickName(n) {
  selectedName = n;
  renderNameGrid();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = cats.map(c =>
    `<button class="tab ${c===cat?'active':''}" onclick="pickCat('${c}')">${c}</button>`
  ).join('');
}

function pickCat(c) {
  cat = c; sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  renderTabs(); renderMenu();
}

function renderMenu() {
  document.getElementById('menuList').innerHTML = getMenu()[cat].map((item, i) => `
    <div class="menu-item ${sel===item?'selected':''}" onclick="pickItem(${i})">
      <div class="item-left">
        <div class="item-name">
          ${item.star?'<span class="star-icon">★</span>':''}
          ${item.name}
          ${item.tempOnly?`<span class="badge">Only ${item.tempOnly}</span>`:''}
        </div>
        ${item.note?`<div class="item-note">${item.note}</div>`:''}
      </div>
      <div class="item-price">${item.price.toLocaleString()}원</div>
    </div>
  `).join('');
}

function pickItem(i) {
  sel = getMenu()[cat][i];
  temp = sel.tempOnly ?? null;
  size = sel.hasSize ? 'M' : null;
  bean = sel.hasBean ? 'sig' : null;
  extras = [];
  renderMenu();
  renderOpts();
  document.getElementById('optCard').style.display = 'block';
  document.getElementById('optCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderOpts() {
  let html = '';

  // Temperature
  if (!sel.tempOnly && !TEMP_FREE.has(cat)) {
    html += `<div class="opt-group">
      <div class="opt-label">온도</div>
      <div class="opt-btns">
        <button class="opt-btn ${temp==='ICE'?'on':''}" onclick="setTemp('ICE')">🧊 ICE</button>
        <button class="opt-btn ${temp==='HOT'?'on':''}" onclick="setTemp('HOT')">☕ HOT</button>
      </div></div>`;
  }

  // Size (아메리카노) — HOT은 L 없음
  if (sel.hasSize) {
    const prices  = {S:1500, M:2500, L:3500};
    const sizes   = temp === 'ICE' ? ['S','M','L'] : ['S','M'];
    html += `<div class="opt-group">
      <div class="opt-label">사이즈</div>
      <div class="opt-btns">
        ${sizes.map(s =>
          `<button class="opt-btn ${size===s?'on':''}" onclick="setSize('${s}')">
            ${s} (${prices[s].toLocaleString()}원)
          </button>`
        ).join('')}
      </div></div>`;
  }

  // Bean
  if (sel.hasBean) {
    html += `<div class="opt-group">
      <div class="opt-label">원두 선택</div>
      <div class="opt-btns">
        <button class="opt-btn ${bean==='sig'?'on':''}" onclick="setBean('sig')">소소 시그니처</button>
        <button class="opt-btn ${bean==='dark'?'on':''}" onclick="setBean('dark')">프리미엄 다크</button>
      </div></div>`;
  }

  // Extras
  html += `<div class="opt-group">
    <div class="opt-label">추가 옵션</div>
    <div class="opt-btns">
      ${EXTRAS.map((e,i) =>
        `<button class="opt-btn extra ${extras.includes(i)?'on':''}" onclick="toggleExtra(${i})">
          ${e.label} +${e.price.toLocaleString()}
        </button>`
      ).join('')}
    </div></div>`;

  document.getElementById('optGroups').innerHTML = html;
}

function setTemp(t) {
  temp = t;
  if (t === 'HOT' && size === 'L') size = 'M'; // HOT엔 L 없음
  renderOpts();
}
function setSize(s) { size = s; renderOpts(); }
function setBean(b) { bean = b; renderOpts(); }
function toggleExtra(i) {
  extras = extras.includes(i) ? extras.filter(x=>x!==i) : [...extras, i];
  renderOpts();
}

function calcPrice() {
  let p = sel.price;
  if (size === 'S') p = 1500;
  if (size === 'L') p = 3500;
  extras.forEach(i => { p += EXTRAS[i].price; });
  return p;
}

function buildOptsLabel() {
  const parts = [];
  if (temp) parts.push(temp);
  if (size && size !== 'M') parts.push(size + '사이즈');
  if (bean === 'sig')  parts.push('시그니처');
  if (bean === 'dark') parts.push('다크');
  extras.forEach(i => parts.push(EXTRAS[i].label));
  return parts.join(' · ');
}

function addOrder() {
  const name = selectedName;
  if (!name) { toast('주문자를 선택해주세요'); return; }
  if (!sel)  { toast('메뉴를 선택해주세요'); return; }
  if (!sel.tempOnly && !TEMP_FREE.has(cat) && !temp) { toast('온도를 선택해주세요'); return; }

  const opts = buildOptsLabel();
  const key = sel.name + '|' + opts;
  const existing = orders.find(o => o.key === key);

  if (existing) {
    existing.names.push(name);
  } else {
    orders.push({ key, drink: sel.name, opts, unitPrice: calcPrice(), names: [name] });
  }

  saveOrders(); // Firebase 저장 → onValue가 renderOrders() 처리

  sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  renderMenu();
  toast(`${name}님 주문 추가 완료!`);
}

function removeName(key, nameIdx) {
  const group = orders.find(o => o.key === key);
  if (!group) return;
  group.names.splice(nameIdx, 1);
  if (group.names.length === 0) orders = orders.filter(o => o.key !== key);
  saveOrders(); // Firebase 저장 → onValue가 renderOrders() 처리
}

function renderOrders() {
  const el = document.getElementById('orderList');
  if (!orders.length) {
    el.innerHTML = '<div class="empty">아직 주문이 없어요</div>';
    document.getElementById('totalRow').style.display = 'none';
    document.getElementById('btnCopy').style.display = 'none';
    document.getElementById('btnReset').style.display = 'none';
    renderNameGrid();
    return;
  }

  el.innerHTML = orders.map(o => {
    const safeKey = encodeURIComponent(o.key);
    const nameTags = o.names.map((n, i) =>
      `<span class="name-tag">${n}<button onclick="removeName(decodeURIComponent('${safeKey}'),${i})">×</button></span>`
    ).join('');
    const subtotal = (o.unitPrice * o.names.length).toLocaleString();
    return `
      <div class="order-item">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:4px">
            <div class="order-drink">${o.drink}</div>
            ${o.names.length > 1 ? `<span class="order-count">×${o.names.length}</span>` : ''}
          </div>
          ${o.opts ? `<div class="order-opts">${o.opts}</div>` : ''}
          <div class="name-tags">${nameTags}</div>
        </div>
        <div class="order-price" style="align-self:flex-start;padding-top:2px">${subtotal}원</div>
      </div>`;
  }).join('');

  const totalNames = orders.reduce((s,o) => s + o.names.length, 0);
  const total = orders.reduce((s,o) => s + o.unitPrice * o.names.length, 0);
  document.getElementById('totalCount').textContent = `${totalNames}명`;
  document.getElementById('totalAmt').textContent = total.toLocaleString() + '원';
  document.getElementById('totalRow').style.display = 'flex';
  document.getElementById('btnCopy').style.display = 'block';
  document.getElementById('btnReset').style.display = 'block';
  renderNameGrid();
}

function copyOrders() {
  // 메뉴판 등장 순서 맵 생성
  const menuOrder = {};
  let idx = 0;
  Object.values(getMenu()).forEach(items =>
    items.forEach(item => { menuOrder[item.name] = idx++; })
  );

  // 메뉴 순서로 정렬 후 같은 음료끼리 모음
  const sorted = [...orders].sort((a, b) =>
    (menuOrder[a.drink] ?? 999) - (menuOrder[b.drink] ?? 999)
  );

  const lines = [];
  let prevDrink = null;
  sorted.forEach(o => {
    if (prevDrink !== null && prevDrink !== o.drink) lines.push('');
    let line = o.drink;
    if (o.opts) line += ` (${o.opts})`;
    line += ` ×${o.names.length}`;
    lines.push(line);
    prevDrink = o.drink;
  });

  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('클립보드에 복사됐어요!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('클립보드에 복사됐어요!');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 페이지 전환 ────────────────────────────
function switchPage(page) {
  document.getElementById('page-coffee').style.display = page === 'coffee' ? 'block' : 'none';
  document.getElementById('page-lunch').style.display  = page === 'lunch'  ? 'block' : 'none';
  document.querySelectorAll('.page-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.page === page)
  );
  if (page === 'lunch') initLunch();
}

  '2026-03-01':'삼일절',
  '2026-05-05':'어린이날','2026-05-25':'대체공휴일',
  '2026-05-24':'부처님오신날',
  '2026-06-06':'현충일',
  '2026-08-15':'광복절',
  '2026-09-24':'추석연휴','2026-09-25':'추석',
  '2026-10-03':'개천절','2026-10-09':'한글날',
  '2026-12-25':'크리스마스',
};

let currentWeekMonday = null;
let selectedLunchDate = null;

let lunchSelectedName = null;
let lunchChoices      = {};
let lunchRef          = null;
let cafeImages        = {};   // { 이리오너라: 'data:image/...', ... }
let cafeImagesRef     = null;
let currentImageOpt   = null; // 이미지 메뉴 열린 옵션명

// 오늘은 여기 어때요?|노트 형태 파싱
function getChoiceBase(val) { return val ? val.split('|')[0] : null; }
function getChoiceNote(val) { return (val && val.includes('|')) ? val.split('|')[1] : ''; }

function formatDate(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function getLunchDateKey() { return formatDate(selectedLunchDate || new Date()); }

function getThisMonday(d) {
  d = d || new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekDays(monday) {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function prevWeek() {
  const m = new Date(currentWeekMonday);
  m.setDate(m.getDate() - 7);
  currentWeekMonday = m;
  switchLunchDay(formatDate(m));
}
function nextWeek() {
  const m = new Date(currentWeekMonday);
  m.setDate(m.getDate() + 7);
  currentWeekMonday = m;
  switchLunchDay(formatDate(m));
}
function switchLunchDay(dateStr) {
  selectedLunchDate = new Date(dateStr + 'T00:00:00');
  lunchSelectedName = null;
  lunchChoices = {};
  renderWeekTabs();
  initLunchDay();
  renderLunchNameGrid();
  renderLunchOpts();
}

function renderWeekTabs() {
  const days    = getWeekDays(currentWeekMonday);
  const todayStr = formatDate(new Date());
  const selStr   = formatDate(selectedLunchDate);
  const end      = days[4];
  const m        = currentWeekMonday;
  document.getElementById('weekLabel').textContent =
    `${m.getMonth()+1}월 ${m.getDate()}일 ~ ${end.getMonth()+1}월 ${end.getDate()}일`;

  const DOWS = ['월','화','수','목','금'];
  document.getElementById('dayTabs').innerHTML = days.map((d, i) => {
    const ds      = formatDate(d);
    const holiday = HOLIDAYS[ds];
    const cls     = ['day-tab',
      ds === selStr              ? 'active'  : '',
      ds === todayStr && ds !== selStr ? 'today' : '',
      holiday                    ? 'holiday' : '',
    ].filter(Boolean).join(' ');
    return `<button class="${cls}" ${holiday ? 'disabled' : `onclick="switchLunchDay('${ds}')"`}>
      <div class="day-dow">${ds === todayStr ? '오늘' : DOWS[i]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${holiday ? `<div class="day-holi">${holiday}</div>` : ''}
    </button>`;
  }).join('');
}

function initLunch() {
  if (!currentWeekMonday) {
    currentWeekMonday = getThisMonday();
    selectedLunchDate = new Date();
    selectedLunchDate.setHours(0,0,0,0);
  }
  renderWeekTabs();
  initLunchDay();

  // 카페 이미지 리스너 (한 번만 등록)
  if (!cafeImagesRef) {
    cafeImagesRef = db.ref('si-cafe-images');
    cafeImagesRef.on('value', snap => {
      cafeImages = snap.val() || {};
      renderLunchOpts();
    });
  }
}

function initLunchDay() {
  if (lunchRef) lunchRef.off();
  lunchRef = db.ref(`si-lunch/${getLunchDateKey()}`);
  lunchRef.on('value', snap => {
    lunchChoices = snap.val() || {};
    renderLunchNameGrid();
    renderLunchResult();
    const noteEl = document.getElementById('lunchNote');
    if (!(noteEl && document.activeElement === noteEl)) renderLunchOpts();
  });
}

function renderLunchNameGrid() {
  document.getElementById('lunchNameGrid').innerHTML = PEOPLE.map(n => {
    const choice = lunchChoices[n];
    const base   = getChoiceBase(choice);
    const cls = ['name-btn', n === lunchSelectedName ? 'selected' : '', base ? 'ordered' : ''].join(' ');
    return `<button class="${cls}" onclick="pickLunchName('${n}')">
      ${n}
      ${base ? `<span class="ordered-label">${base}</span>` : ''}
    </button>`;
  }).join('');
}

function pickLunchName(n) {
  lunchSelectedName = n;
  renderLunchNameGrid();
  renderLunchOpts();
}

function renderLunchOpts() {
  const current     = lunchChoices[lunchSelectedName];
  const currentBase = getChoiceBase(current);
  const currentNote = getChoiceNote(current);

  let html = '';
  LUNCH_OPTIONS.forEach(opt => {
    const isFull = opt === '오늘은 여기 어때요?';
    const isOn   = currentBase === opt;

    if (IMAGE_OPTS.has(opt)) {
      // 이미지 첨부 가능한 버튼 (이리오너라 / 굿모닝 / 가톨릭회관)
      const imgData = cafeImages[opt];
      html += `<div class="lunch-opt-btn lunch-opt-img-btn ${isOn ? 'on' : ''}" onclick="selectLunch('${opt}')">
        <div class="opt-img-area">
          ${imgData
            ? `<img src="${imgData}" class="opt-img" alt="${opt}">`
            : '<span class="opt-plus-icon">+</span>'}
        </div>
        ${imgData ? `<button class="opt-view-btn" onclick="event.stopPropagation();viewImage('${opt}')">🔍 크게보기</button>` : ''}
        <span class="opt-name">${opt}</span>
        <button class="opt-img-action-btn" onclick="event.stopPropagation();openImageMenu('${opt}',event)">${imgData ? '✎' : '+'}</button>
      </div>`;
    } else {
      html += `<button class="lunch-opt-btn ${isFull ? 'lunch-opt-full' : ''} ${isOn ? 'on' : ''}" onclick="selectLunch('${opt}')">${opt}</button>`;
      if (isFull && isOn) {
        html += `<input type="text" id="lunchNote" class="lunch-note-input"
          placeholder="어디 가고 싶어요?"
          value="${currentNote.replace(/"/g, '&quot;')}"
          onblur="saveLunchNote()"
          onkeydown="if(event.key==='Enter')this.blur()">`;
      }
    }
  });

  document.getElementById('lunchOpts').innerHTML = html;

  // 새로 렌더링 후 입력창에 포커스
  if (currentBase === '오늘은 여기 어때요?') {
    const noteEl = document.getElementById('lunchNote');
    if (noteEl && !currentNote) noteEl.focus();
  }
}

function selectLunch(opt) {
  if (!lunchSelectedName) { toast('이름을 먼저 선택해주세요'); return; }
  const current     = lunchChoices[lunchSelectedName];
  const currentBase = getChoiceBase(current);
  // 같은 항목 다시 누르면 취소
  lunchRef.child(lunchSelectedName).set(currentBase === opt ? null : opt);
}

function cancelLunchChoice(name) {
  lunchRef.child(name).set(null);
}

function saveLunchNote() {
  if (!lunchSelectedName) return;
  const noteEl = document.getElementById('lunchNote');
  if (!noteEl) return;
  const note  = noteEl.value.trim();
  const value = note ? `오늘은 여기 어때요?|${note}` : '오늘은 여기 어때요?';
  lunchRef.child(lunchSelectedName).set(value);
}

// ── 이미지 라이트박스 ──────────────────────
function viewImage(opt) {
  const imgData = cafeImages[opt];
  if (!imgData) return;
  document.getElementById('lightboxImg').src = imgData;
  document.getElementById('imgLightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('imgLightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
// ───────────────────────────────────────────

// ── 카페 이미지 관리 ───────────────────────
function openImageMenu(opt, e) {
  currentImageOpt = opt;
  const menu = document.getElementById('imgMenu');
  const delBtn = document.getElementById('imgMenuDelete');
  delBtn.style.display = cafeImages[opt] ? 'block' : 'none';

  // 팝업 위치 계산
  const rect = e.currentTarget.getBoundingClientRect();
  const menuW = 170;
  let left = rect.left;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  menu.style.left = left + 'px';
  menu.style.top  = (rect.bottom + 6) + 'px';
  menu.style.display = 'block';

  setTimeout(() => document.addEventListener('click', closeImageMenu, { once: true }), 0);
}

function closeImageMenu() {
  document.getElementById('imgMenu').style.display = 'none';
}

async function pasteFromClipboard() {
  closeImageMenu();
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      const imgType = item.types.find(t => t.startsWith('image/'));
      if (imgType) {
        const blob = await item.getType(imgType);
        const reader = new FileReader();
        reader.onload = async ev => {
          const compressed = await compressImage(ev.target.result, 800, 600, 0.75);
          db.ref(`si-cafe-images/${currentImageOpt}`).set(compressed);
          toast('이미지가 등록됐어요!');
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
    toast('클립보드에 이미지가 없어요');
  } catch(err) {
    toast('클립보드 접근 권한을 허용해주세요');
  }
}

function triggerFileInput() {
  closeImageMenu();
  document.getElementById('imgFileInput').click();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const compressed = await compressImage(ev.target.result, 800, 600, 0.75);
    db.ref(`si-cafe-images/${currentImageOpt}`).set(compressed);
    toast('이미지가 등록됐어요!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeCurrentImage() {
  closeImageMenu();
  db.ref(`si-cafe-images/${currentImageOpt}`).remove();
  toast('이미지를 삭제했어요');
}

function compressImage(dataURL, maxW, maxH, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
      const w = Math.round(img.width  * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataURL;
  });
}
// ───────────────────────────────────────────

function renderLunchResult() {
  const groups = {};
  LUNCH_OPTIONS.forEach(opt => { groups[opt] = []; });
  groups['미선택'] = [];
  const personNotes = {}; // name → note (오늘은 여기 어때요?용)

  PEOPLE.forEach(n => {
    const c    = lunchChoices[n];
    const base = getChoiceBase(c);
    const note = getChoiceNote(c);
    if (base && groups[base] !== undefined) {
      groups[base].push(n);
      if (note) personNotes[n] = note;
    } else {
      groups['미선택'].push(n);
    }
  });

  const el = document.getElementById('lunchResult');
  const rows = [...LUNCH_OPTIONS]
    .filter(opt => groups[opt].length > 0)
    .map(opt => {
      const nameTags = groups[opt].map(n => {
        const note = personNotes[n] ? `(${personNotes[n]})` : '';
        const cancelBtn = opt !== '미선택' ? `<button onclick="cancelLunchChoice('${n}')">×</button>` : '';
        return `<span class="lunch-name-tag">${n}${note}${cancelBtn}</span>`;
      }).join('');
      return `
        <div class="lunch-result-row">
          <div class="lunch-result-label">
            ${opt} <span class="lunch-count">${groups[opt].length}명</span>
          </div>
          <div class="lunch-result-names">${nameTags}</div>
        </div>`;
    }).join('');
  el.innerHTML = rows || '<div class="empty">아직 선택한 사람이 없어요</div>';
}
// ───────────────────────────────────────────

// ── 과거 주문내역 ──────────────────────────
let historyOpen = false;
let historyData = {}; // 로드된 데이터 캐시

function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('histArrow').className = 'arrow' + (historyOpen ? ' open' : '');
  const list = document.getElementById('historyList');
  list.style.display = historyOpen ? 'block' : 'none';
  if (historyOpen) loadHistory();
}

function loadHistory() {
  historyRef.orderByKey().limitToLast(30).once('value', snap => {
    const val = snap.val();
    const list = document.getElementById('historyList');
    if (!val) { list.innerHTML = '<div class="empty">조회된 내역이 없어요</div>'; return; }
    historyData = val;
    const entries = Object.entries(val).reverse(); // 최신순
    list.innerHTML = entries.map(([key]) => {
      const entry = historyData[key];
      return `<div class="history-entry">
        <div class="history-header" onclick="toggleHistoryEntry('${key}')">
          <span class="history-date">${entry.date}</span>
          <span class="history-arrow" id="ha-${key}">▼</span>
        </div>
        <div class="history-body" id="hb-${key}" style="display:none"></div>
      </div>`;
    }).join('');
  });
}

function toggleHistoryEntry(key) {
  const body  = document.getElementById(`hb-${key}`);
  const arrow = document.getElementById(`ha-${key}`);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.className = 'history-arrow' + (isOpen ? '' : ' open');

  if (!isOpen && !body.dataset.loaded) {
    const entry = historyData[key];
    const orderRows = entry.orders.map(o => {
      let line = o.drink;
      if (o.opts) line += ` (${o.opts})`;
      line += ` ×${o.names.length}`;
      return `<div class="history-order">${line}</div>
              <div class="history-names">→ ${o.names.join(', ')}</div>`;
    }).join('');
    body.innerHTML = orderRows + `<button class="btn-copy-hist" onclick="copyHistory('${key}')">📋 복사</button>`;
    body.dataset.loaded = '1';
  }
}

function copyHistory(key) {
  const entry = historyData[key];
  if (!entry) return;

  const menuOrder = {};
  let idx = 0;
  Object.values(getMenu()).forEach(items =>
    items.forEach(item => { menuOrder[item.name] = idx++; })
  );
  const sorted = [...entry.orders].sort((a, b) =>
    (menuOrder[a.drink] ?? 999) - (menuOrder[b.drink] ?? 999)
  );

  const lines = [];
  let prevDrink = null;
  sorted.forEach(o => {
    if (prevDrink !== null && prevDrink !== o.drink) lines.push('');
    let line = o.drink;
    if (o.opts) line += ` (${o.opts})`;
    line += ` ×${o.names.length}  ${o.names.join(', ')}`;
    lines.push(line);
    prevDrink = o.drink;
  });

  const text = `[${entry.date}]\n` + lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('복사됐어요!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
// ────────────────────────────────────────────

init();

</script>
