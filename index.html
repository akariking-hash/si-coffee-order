<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SI Team Orders</title>
  <link rel="icon" type="image/png" href="favicon_si.png">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      /* ── 글로벌 (공통) ── */
      --primary: #8B1A1A;   /* 페이지 네비게이션 전용 */
      --bg:      #FDEBEB;
      --card:    #ffffff;
      --border:  #e8d5c8;
      --text:    #2c1a1a;
      --muted:   #8a6a6a;

      /* ── 테마 토큰 기본값 (소소) ── */
      --accent:         #8B1A1A;
      --accent-muted:   #B08080;
      --accent-border:  #E8D5C8;
      --accent-hover:   #FDEBEB;
      --accent-divider: #E8C8C8;
      --accent-extra:   #5C2E2E;
    }

    /* ── 점심 선택 테마 ── */
    #page-lunch {
      --bg:             #FFF0E8;
      background: var(--bg);
      --accent:         #F5620A;
      --accent-muted:   #CF8A76;
      --accent-border:  #E8D3C8;
      --accent-hover:   #FFF0E8;
      --accent-divider: #E8D3C8;
      --accent-extra:   #763E23;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    header h1 { font-size: 20px; font-weight: 700; color: #000; letter-spacing: -0.3px; }
    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .cafe-tabs { display: flex; gap: 5px; }
    .cafe-tab {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--tab-border, var(--border));
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: var(--tab-text, #b08080);
      transition: all 0.15s;
    }
    .cafe-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
    .cafe-tab:hover:not(.active) { border-color: var(--tab-color, var(--accent)); color: var(--tab-color, var(--accent)); }
    .conn-info { font-size: 11px; color: #b08080; }

    /* 페이지 탭 네비게이션 */
    .page-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 0;
      position: sticky;
      top: 73px;
      z-index: 99;
    }
    .page-tab {
      flex: 1;
      max-width: 160px;
      padding: 11px 0;
      border: none;
      border-bottom: 2.5px solid transparent;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #888;
      transition: all 0.15s;
    }
    .page-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

    /* 주간 탭 */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .week-label { font-size: 13px; font-weight: 700; color: var(--text); }
    .week-nav-btn {
      background: none; border: 1.5px solid var(--accent-border); border-radius: 8px;
      min-width: 36px; min-height: 36px; padding: 0 10px;
      cursor: pointer; font-size: 12px; color: var(--accent-muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .week-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .day-tabs { display: flex; gap: 5px; }
    .day-tab {
      flex: 1; padding: 7px 2px; border-radius: 10px;
      border: 1.5px solid var(--accent-border); background: transparent;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .day-tab .day-dow { font-size: 10px; font-weight: 700; color: var(--accent-muted); }
    .day-tab .day-num { font-size: 15px; font-weight: 700; color: var(--text); margin: 2px 0; }
    .day-tab .day-holi { font-size: 8px; color: #333333; line-height: 1.2; }
    .day-tab.today { border-color: #c0a090; }
    .day-tab.today .day-num { color: var(--accent); }
    .day-tab.active { background: var(--accent); border-color: var(--accent); }
    .day-tab.active .day-dow,
    .day-tab.active .day-num,
    .day-tab.active .day-holi { color: white !important; }
    .day-tab.holiday {
      opacity: 0.45;
      background: #f0ebe8;
      border-color: #e0d0c8;
      cursor: not-allowed;
    }
    .day-tab.holiday .day-num { color: #333333; }

    /* 점심 선택 */
    #lunchOpts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .lunch-opt-btn {
      padding: 11px 8px;
      border-radius: 10px;
      border: 1.5px solid #d5d5d5;
      background: var(--card);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      text-align: center;
      transition: all 0.15s;
    }
    .lunch-opt-full { grid-column: 1 / -1; text-align: center; }
    .lunch-opt-btn:not(.lunch-opt-img-btn):not(.lunch-opt-full) { min-height: 80px; }
    .lunch-opt-btn:hover:not(.on) { border-color: var(--accent); color: var(--accent); }
    .lunch-opt-btn.on { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

    /* 점심 이름 그리드 — 오렌지 테마 */
    #page-lunch .name-btn:hover { background: #FFF0E8; border-color: var(--border); color: var(--text); }
    #page-lunch .name-btn.ordered {
      border-color: #F5620A;
      background: #FFF0E8;
      color: #C44A00;
    }
    #page-lunch .name-btn.ordered .ordered-label {
      color: #D95500;
      opacity: 1;
    }
    #page-lunch .name-btn.selected {
      background: #F5620A;
      border-color: #F5620A;
      color: white;
      box-shadow: 0 0 0 3px rgba(245,98,10,0.18);
    }
    #page-lunch .name-btn.selected.ordered {
      background: #F5620A;
      border-color: #F5620A;
      color: white;
      box-shadow: 0 0 0 3px rgba(245,98,10,0.18);
    }
    #page-lunch .name-btn.selected .ordered-label {
      color: rgba(255,255,255,0.85);
    }

    .lunch-result-row { padding: 12px 0; border-bottom: 1px solid var(--accent-divider); }
    .lunch-result-row:last-child { border-bottom: none; }
    .lunch-result-label { font-size: 15px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .lunch-count { font-size: 12px; color: var(--accent-muted); font-weight: 400; }
    .lunch-result-names { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .lunch-name-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 6px 8px 6px 13px;
      background: var(--accent-hover);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .lunch-name-tag button {
      background: none; border: none;
      color: #c0a090; cursor: pointer;
      font-size: 16px; padding: 2px 2px; line-height: 1; margin-left: 2px;
    }
    .lunch-name-tag button:hover { color: var(--accent); }
    .lunch-join-btn {
      font-size: 12px; font-weight: 700;
      padding: 7px 16px; border-radius: 6px;
      border: 1.5px solid var(--accent);
      background: none; color: var(--accent);
      cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .lunch-join-btn:hover { background: var(--accent); color: white; }
    .lunch-result-sub { margin-top: 7px; padding-left: 10px; border-left: 2.5px solid #FFD0A8; }
    .lunch-sub-header {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .lunch-sub-label { font-size: 14px; font-weight: 700; color: var(--accent); }
    .lunch-sub-names { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }

    /* ── 점심 페이지 개별 오버라이드 (변수로 처리 안 되는 것만) ── */
    #page-lunch .day-tab.today { border-color: #F5A060; }
    #page-lunch .lunch-opt-img-btn.on .opt-name { color: var(--accent); }
    #page-lunch .lunch-note-input:focus { border-color: var(--accent); background: var(--accent-hover); }
    #page-lunch .name-direct-wrap:hover { background: var(--accent-hover) !important; border-color: var(--border); }
    #page-lunch .name-direct-wrap.focused { border-color: var(--accent); }
    /* 공휴일은 active/today 여부와 무관하게 항상 비활성 회색 */
    #page-lunch .day-tab.holiday,
    #page-lunch .day-tab.holiday.active,
    #page-lunch .day-tab.today.holiday { background: #f0ebe8 !important; border-color: #e0d0c8 !important; }
    #page-lunch .day-tab.holiday .day-num { color: #333333 !important; }

    .container { max-width: 480px; margin: 0 auto; padding: 14px 14px 0; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--accent-border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Name input */
    .name-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }
    .name-btn {
      padding: 7px 4px;
      border-radius: 9px;
      border: 1.5px solid var(--accent-border);
      background: #fafafa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      position: relative;
    }
    .name-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-hover); }
    .name-grid-outer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .name-grid-outer > .name-grid { display: contents; }
    .name-btn-del {
      position: absolute; top: 2px; right: 3px;
      width: 15px; height: 15px; border-radius: 50%;
      background: #fff; border: 1.5px solid #ccc;
      font-size: 11px; font-weight: 700; color: #aaa;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .name-btn-del:hover { border-color: #999; color: #666; }
    .name-btn.selected .name-btn-del { border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.85); background: transparent; }
    .name-btn.selected .name-btn-del:hover { border-color: #fff; color: #fff; }
    .name-direct-wrap {
      position: relative; display: flex; align-items: center; justify-content: center;
      padding: 7px 4px; border-radius: 9px; border: 1.5px solid var(--accent-border);
      background: #fafafa; cursor: text; transition: border-color 0.15s;
    }
    .name-direct-wrap:hover { background: #fff5f0; }
    .name-direct-wrap.focused { border-color: var(--primary); background: #fafafa !important; }
    .name-direct-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      padding: 4px 6px; border: none; outline: none;
      background: transparent; border-radius: 9px;
      font-size: 13px; font-family: inherit; font-weight: 600;
      text-align: center; color: var(--text);
      opacity: 0; pointer-events: none;
    }
    .name-direct-wrap.focused .name-direct-input { opacity: 1; background: #fafafa; pointer-events: auto; }
    .name-direct-wrap.focused .name-direct-ph { opacity: 0; }
    .name-direct-ph {
      font-size: 13px; font-weight: 600; color: var(--accent-muted);
      text-align: center; line-height: 1.4; pointer-events: none;
      transition: opacity 0.1s;
    }
    .name-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
    .name-btn.ordered { border-color: var(--accent-muted); background: var(--accent-hover); color: var(--accent); }
    .ordered-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: -0.2px;
      opacity: 0.85;
    }

    /* Tabs */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tab {
      flex-shrink: 0;
      padding: 7px 17px;
      border-radius: 20px;
      border: 1.5px solid var(--accent-border);
      background: var(--card);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--accent-muted);
      transition: all 0.15s;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Menu items */
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s;
      margin: 0 -10px;
    }
    .menu-item:hover { background: var(--accent-hover); }
    .menu-item.selected { background: var(--accent-hover); }
    .item-left { flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .star-icon { color: var(--accent); font-size: 11px; }
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 9px;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .item-note { font-size: 11px; color: var(--accent-muted); margin-top: 2px; }
    .item-price { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; }

    /* Options */
    .opt-group { margin-bottom: 14px; }
    .opt-label { font-size: 11px; font-weight: 700; color: var(--accent-muted); letter-spacing: 0.5px; margin-bottom: 7px; text-transform: uppercase; }
    .opt-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .opt-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--accent-border);
      background: var(--card);
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .opt-btn:not(.on):hover { background: var(--accent-hover); border-color: var(--accent); }
    .opt-btn.on { background: var(--accent-extra); border-color: var(--accent-extra); color: white; }

    /* Buttons */
    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.88; }

    /* Order list */
    .order-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--accent-divider);
      gap: 8px;
    }
    .order-item:last-child { border-bottom: none; }
    .order-who { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .order-drink { font-size: 14px; font-weight: 500; }
    .order-opts { font-size: 12px; color: var(--accent-muted); margin-top: 2px; }
    .order-right { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .order-price { font-size: 14px; font-weight: 700; }
    .btn-del {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 17px;
      padding: 0 0 0 4px;
      line-height: 1;
      transition: color 0.12s;
    }
    .btn-del:hover { color: var(--accent); }

    .name-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .name-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 6px 8px 6px 13px;
      background: var(--accent-hover);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .name-tag button {
      background: none;
      border: none;
      color: var(--accent-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      margin-left: 1px;
    }
    .name-tag button:hover { color: var(--accent); }
    .order-count {
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: var(--accent);
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 4px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 6px;
      border-top: 2px solid var(--accent-border);
      font-weight: 700;
      font-size: 16px;
    }
    .total-count { font-size: 12px; color: var(--accent-muted); font-weight: 400; }

    .btn-copy {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-reset {
      width: 100%;
      padding: 10px;
      background: none;
      color: var(--accent-muted);
      border: 1.5px solid var(--accent-border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }
    .conn-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 4px;
      vertical-align: middle;
    }
    .conn-dot.on { background: #4caf50; }

    .empty { text-align: center; color: var(--accent-muted); font-size: 14px; padding: 18px 0; }

    .history-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .history-toggle .arrow { font-size: 10px; color: var(--accent-muted); transition: transform 0.2s; }
    .history-toggle .arrow.open { transform: rotate(180deg); }

    .history-entry {
      border-bottom: 1px solid var(--accent-divider);
    }
    .history-entry:last-child { border-bottom: none; }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      cursor: pointer;
      user-select: none;
    }
    .history-header:hover .history-date { opacity: 0.75; }
    .history-date { font-size: 13px; font-weight: 700; color: var(--accent); transition: color 0.12s; }
    .history-arrow { font-size: 10px; color: var(--accent-muted); transition: transform 0.2s; }
    .history-arrow.open { transform: rotate(180deg); }
    .history-body { padding-bottom: 10px; }
    .history-order { font-size: 13px; margin-bottom: 2px; }
    .history-names { font-size: 11px; color: var(--accent-muted); margin-bottom: 8px; }
    .btn-copy-hist {
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--accent-border);
      background: none;
      cursor: pointer;
      color: var(--accent-muted);
      margin-top: 4px;
      transition: all 0.15s;
    }
    .btn-copy-hist:hover { border-color: var(--accent); color: var(--accent); }

    /* 이미지 첨부 버튼 */
    .lunch-opt-img-btn {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      cursor: pointer;
    }
    .lunch-opt-img-btn.on {
      background: var(--card) !important;
      border-color: var(--accent);
      border-width: 2.5px;
    }
    .lunch-opt-img-btn.on .opt-name { color: var(--primary); font-weight: 700; }
    .opt-img-area {
      width: 100%;
      height: 76px;
      background: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .opt-img { width: 100%; height: 100%; object-fit: cover; }
    .opt-img-icon { color: #a5a5a5; display: flex; align-items: center; justify-content: center; }
    .opt-name { padding: 7px 6px; font-size: 13px; font-weight: 600; color: var(--text); text-align: center; }
    .opt-img-action-btn {
      position: absolute;
      top: 5px; right: 5px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.1);

}
function saveMyName(n) {
  try { localStorage.setItem('si-my-name', n); } catch(e) {}

function getPeopleOrdered() {
  const me = getMyName();
  if (!me || !PEOPLE.includes(me)) return PEOPLE;

function normalizeOrders(arr) {
  return arr.map(o => ({
    ...o,
    opts: (o.opts || '')
      .replace(/디카페인 변경/g, '디카페인')
      .replace(/오트밀 변경/g,   '오트밀'),
  }));
}

// ─── localStorage 캐시 (오프라인 대비) ───
function saveLocal() {
  try { localStorage.setItem(getLsKey(), JSON.stringify(orders)); } catch(e) {}
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(getLsKey());
    if (raw) { orders = normalizeOrders(JSON.parse(raw)); renderOrders(); }
  } catch(e) {}
}
function clearLocal() {
  try { localStorage.removeItem(getLsKey()); } catch(e) {}
}

function attachOrderListener() {
  orderRef.on('value', snap => {
    const val = snap.val();
    try { orders = normalizeOrders(val && val.json ? JSON.parse(val.json) : []); }
    catch(e) { orders = []; }
    saveLocal();
    renderOrders();
  });
}

function saveOrders() {
  saveLocal();
  if (!orders.length) { orderRef.remove(); return; }
  orderRef.set({ json: JSON.stringify(orders), ts: Date.now() });
}

function resetOrders() {
  if (!confirm('주문 내역을 전체 초기화할까요?')) return;
  if (orders.length > 0) {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    historyRef.push({ date: dateStr, orders: JSON.parse(JSON.stringify(orders)) });
  }
  orders = [];
  clearLocal();
  orderRef.remove();
}

function renderOpts() {

          `<button class="opt-btn ${size===s?'on':''}" onclick="setSize('${s}')">

          </button>`
        ).join('')}
      </div></div>`;
  }

  // Bean (카페별)
  if (sel.hasBean) {
    html += `<div class="opt-group">
      <div class="opt-label">원두 선택</div>
      <div class="opt-btns">
        ${getCafeBeans().map(b =>
          `<button class="opt-btn ${bean===b.value?'on':''}" onclick="setBean('${b.value}')">${b.label}</button>`
        ).join('')}
      </div></div>`;
  }

  // Extras (카페별 — 카테고리에 따라 숨김 가능)
  if (!getMenu()._config?.noExtrasCategories?.has(cat)) {
    html += `<div class="opt-group">
      <div class="opt-label">추가 옵션</div>
      <div class="opt-btns">
        ${getCafeExtras().map((e,i) => {
          if (e.nameContains && !sel.name.includes(e.nameContains)) return '';
          return `<button class="opt-btn extra ${extras.includes(i)?'on':''}" onclick="toggleExtra(${i})">
            ${e.label}${e.price > 0 ? ' +' + e.price.toLocaleString() : ''}
          </button>`;
        }).join('')}
      </div></div>`;
  }

function setTemp(t) {
  temp = t;
  if (t === 'HOT' && size === 'L') size = 'M'; // HOT엔 L 없음
  renderOpts();
}
function setSize(s) { size = s; renderOpts(); }
function setBean(b) { bean = b; renderOpts(); }
function toggleExtra(i) {
  extras = extras.includes(i) ? extras.filter(x=>x!==i) : [...extras, i];
  renderOpts();
}

function calcPrice() {
  let p = sel.price;
  if (size === 'S') p = 1500;
  if (size === 'L') p = 3500;
  if (bean) {
    const beanDef = getCafeBeans().find(b => b.value === bean);
    if (beanDef?.price) p += beanDef.price;
  }
  const cafeExtras = getCafeExtras();
  extras.forEach(i => { p += cafeExtras[i].price; });
  return p;
}

function buildOptsLabel() {
  const parts = [];
  if (temp) parts.push(temp);
  if (size && size !== 'M') parts.push(size + '사이즈');
  if (bean) {
    const beanDef = getCafeBeans().find(b => b.value === bean);
    if (beanDef) parts.push(beanDef.short);
  }
  const cafeExtras = getCafeExtras();
  extras.forEach(i => parts.push(cafeExtras[i].label));
  return parts.join(' · ');
}

// 한국어 '로'/'으로' 조사 선택
function josa로(str) {
  const code = str.charCodeAt(str.length - 1);
  if (code < 0xAC00 || code > 0xD7A3) return '로';
  const jong = (code - 0xAC00) % 28;
  return (jong === 0 || jong === 8) ? '로' : '으로';
}

function addOrder() {
  const name = selectedName;
  if (!name) { toast('주문자를 선택해주세요'); return; }
  if (!sel)  { toast('메뉴를 선택해주세요'); return; }
  if (!sel.tempOnly && !TEMP_FREE.has(cat) && !temp) { toast('온도를 선택해주세요'); return; }

  const opts = buildOptsLabel();
  const key  = sel.name + '|' + opts;

  // 이미 다른 메뉴를 주문한 경우 기존 주문에서 제거 (1인 1잔)
  let replaced = false;
  orders = orders.map(o => {
    if (o.names.includes(name)) { replaced = true; return { ...o, names: o.names.filter(n => n !== name) }; }
    return o;
  }).filter(o => o.names.length > 0);

  // 새 주문 추가
  const existing = orders.find(o => o.key === key);
  if (existing) { existing.names.push(name); }
  else { orders.push({ key, drink: sel.name, opts, unitPrice: calcPrice(), names: [name] }); }

  saveOrders();

  // sel 초기화 전에 메뉴명 저장
  const drinkName = opts ? `${sel.name} (${opts})` : sel.name;
  const drinkBase = sel.name;

  sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  renderMenu();

  if (replaced) {
    toast(`${drinkName}${josa로(drinkBase)} 바꾸어서 추가했습니다`);
  } else {
    toast(`${name}님 주문 추가 완료!`);
  }
}

function removeName(key, nameIdx) {
  const group = orders.find(o => o.key === key);
  if (!group) return;
  group.names.splice(nameIdx, 1);
  if (group.names.length === 0) orders = orders.filter(o => o.key !== key);
  saveOrders(); // Firebase 저장 → onValue가 renderOrders() 처리
}

function joinOrder(key) {
  const name = selectedName;
  if (!name) { toast('주문자를 먼저 선택해주세요'); return; }
  const target = orders.find(o => o.key === key);
  if (!target) return;
  if (target.names.includes(name)) { toast('이미 이 메뉴 주문 중이에요'); return; }

  // 다른 주문에서 제거 (target 제외, 1인 1잔)
  orders = orders.map(o =>
    o.key === key ? o : { ...o, names: o.names.filter(n => n !== name) }
  ).filter(o => o.names.length > 0);

  // 해당 주문에 추가
  const t = orders.find(o => o.key === key);
  if (t) t.names.push(name);
  saveOrders();
  toast(`${name}님이 합류했어요!`);
}

function renderOrders() {

        </div>

  }).join('');

  const totalNames = orders.reduce((s,o) => s + o.names.length, 0);

  document.getElementById('totalCount').textContent = `${totalNames}명`;
  document.getElementById('totalAmt').textContent = total.toLocaleString() + '원';
  document.getElementById('totalRow').style.display = 'flex';

  document.getElementById('btnReset').style.display = 'block';
  renderNameGrid();
}

function copyOrders() {
  // 메뉴판 등장 순서 맵 생성
  const menuOrder = {};
  let idx = 0;
  Object.values(getMenu()).filter(Array.isArray).forEach(items =>
    items.forEach(item => { menuOrder[item.name] = idx++; })
  );

  // 메뉴 순서로 정렬 후 같은 음료끼리 모음
  const sorted = [...orders].sort((a, b) =>
    (menuOrder[a.drink] ?? 999) - (menuOrder[b.drink] ?? 999)
  );

  const lines = [];
  let prevDrink = null;
  sorted.forEach(o => {
    if (prevDrink !== null && prevDrink !== o.drink) lines.push('');
    let line = o.drink;
    if (o.opts) line += ` (${o.opts})`;
    line += ` ×${o.names.length}`;
    lines.push(line);
    prevDrink = o.drink;
  });

  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('클립보드에 복사됐어요!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('클립보드에 복사됐어요!');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

let currentImageOpt   = null; // 이미지 메뉴 열린 옵션명
let lunchJoinMode     = false; // 함께해요 버튼으로 참여 시 opts 활성화 억제
let lunchHereMode     = false; // 여기어때요 버튼 클릭 후 텍스트 입력 대기 상태
let lunchTimestamps      = {};  // { 이름: timestamp } — 입력 순서 정렬용
let lunchExtraNamesByDate = {}; // { dateKey: [names] } — 날짜별 직접입력 이름
let lunchExtraNames      = [];  // 현재 날짜의 직접입력 이름 (lunchExtraNamesByDate 참조)

// 오늘은 여기 어때요?|노트 형태 파싱
function getChoiceBase(val) { return val ? val.split('|')[0] : null; }
function getChoiceNote(val) { return (val && val.includes('|')) ? val.split('|')[1] : ''; }

function formatDate(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function getLunchDateKey() { return formatDate(selectedLunchDate || new Date()); }

function getThisMonday(d) {
  d = d || new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekDays(monday) {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function getWeekTarget(days) {
  const todayStr = formatDate(new Date());
  const todayInWeek = days.find(d => formatDate(d) === todayStr);
  return todayInWeek || days.find(d => !HOLIDAYS[formatDate(d)]) || days[0];
}
function prevWeek() {
  const m = new Date(currentWeekMonday);
  m.setDate(m.getDate() - 7);
  currentWeekMonday = m;
  attachCafeImagesListener(); // 주 변경 → 이미지 리스너 갱신
  switchLunchDay(formatDate(getWeekTarget(getWeekDays(m))));
}
function nextWeek() {
  const m = new Date(currentWeekMonday);
  m.setDate(m.getDate() + 7);
  currentWeekMonday = m;
  attachCafeImagesListener(); // 주 변경 → 이미지 리스너 갱신
  switchLunchDay(formatDate(getWeekTarget(getWeekDays(m))));
}
function switchLunchDay(dateStr) {
  selectedLunchDate = new Date(dateStr + 'T00:00:00');
  // 해당 날짜의 직접입력 이름 배열 복원 (없으면 빈 배열 생성)
  if (!lunchExtraNamesByDate[dateStr]) lunchExtraNamesByDate[dateStr] = [];
  lunchExtraNames = lunchExtraNamesByDate[dateStr];
  // 커스텀 이름은 해당 날짜의 직접입력 목록에 있을 때만 선택 유지
  const savedName = getMyName();
  lunchSelectedName = (savedName && (PEOPLE.includes(savedName) || lunchExtraNames.includes(savedName)))
    ? savedName : null;
  lunchHereMode = false;
  lunchChoices = {};
  renderWeekTabs();
  initLunchDay();
  renderLunchNameGrid();
  renderLunchOpts();
}

function renderWeekTabs() {
  const days    = getWeekDays(currentWeekMonday);
  const todayStr = formatDate(new Date());
  const selStr   = formatDate(selectedLunchDate);
  const end      = days[4];
  const m        = currentWeekMonday;
  document.getElementById('weekLabel').textContent =
    `${m.getMonth()+1}월 ${m.getDate()}일 ~ ${end.getMonth()+1}월 ${end.getDate()}일`;

  const DOWS = ['월','화','수','목','금'];
  document.getElementById('dayTabs').innerHTML = days.map((d, i) => {
    const ds      = formatDate(d);
    const holiday = HOLIDAYS[ds];
    const cls     = ['day-tab',
      ds === selStr              ? 'active'  : '',
      ds === todayStr && ds !== selStr ? 'today' : '',
      holiday                    ? 'holiday' : '',
    ].filter(Boolean).join(' ');
    return `<button class="${cls}" ${holiday ? 'disabled' : `onclick="switchLunchDay('${ds}')"`}>
      <div class="day-dow">${ds === todayStr ? '오늘' : DOWS[i]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${holiday ? `<div class="day-holi">${holiday}</div>` : ''}
    </button>`;
  }).join('');
}

function initLunch() {
  if (!lunchSelectedName) lunchSelectedName = getMyName() || null; // 저장된 이름 자동 선택

  if (!currentWeekMonday) {
    currentWeekMonday = getThisMonday();
    selectedLunchDate = new Date();
    selectedLunchDate.setHours(0,0,0,0);
  }

  // 현재 날짜의 직접입력 이름 배열에 참조 연결
  const dateKey = getLunchDateKey();
  if (!lunchExtraNamesByDate[dateKey]) lunchExtraNamesByDate[dateKey] = [];
  lunchExtraNames = lunchExtraNamesByDate[dateKey];

  // 저장된 커스텀 이름은 오늘 날짜 목록에 추가
  if (lunchSelectedName && !PEOPLE.includes(lunchSelectedName) && !lunchExtraNames.includes(lunchSelectedName)) {
    lunchExtraNames.push(lunchSelectedName);
  }

  renderWeekTabs();
  initLunchDay();

  // 카페 이미지 리스너 — 주별로 관리
  attachCafeImagesListener();
}

// 이미지 저장 경로 (옵션별 주기 다름)
function getCafeImagePath(optName) {
  return DAILY_IMAGE_OPTS.has(optName)
    ? `si-cafe-images/daily/${getLunchDateKey()}/${optName}`
    : `si-cafe-images/weekly/${formatDate(currentWeekMonday)}/${optName}`;
}

// 이미지 리스너 연결 (주별 + 일별)
function attachCafeImagesListener() {
  const weekKey = formatDate(currentWeekMonday);
  const dateKey = getLunchDateKey();

  // 주별 리스너 (굿모닝, 가톨릭회관)
  if (cafeImagesWeek !== weekKey) {
    if (cafeImagesRef) cafeImagesRef.off();
    cafeImagesWeek = weekKey;

    // 구버전 경로에서 기존 이미지 한 번 읽어 병합 (하위 호환)
    // 일별 리셋 옵션(이리오너라)은 제외 — daily 경로에서만 관리
    db.ref(`si-cafe-images/${weekKey}`).once('value', snap => {
      const legacy = snap.val() || {};
      Object.entries(legacy).forEach(([k, v]) => {
        if (!DAILY_IMAGE_OPTS.has(k)) weeklyImages[k] = v;
      });
      cafeImages = { ...weeklyImages, ...dailyImages };
      renderLunchOpts();
    });

    cafeImagesRef = db.ref(`si-cafe-images/weekly/${weekKey}`);
    cafeImagesRef.on('value', snap => {
      weeklyImages = { ...weeklyImages, ...(snap.val() || {}) };
      cafeImages = { ...weeklyImages, ...dailyImages };
      renderLunchOpts();
    });
  }

  // 일별 리스너 (이리오너라)
  if (cafeImagesDate !== dateKey) {
    if (cafeImagesDailyRef) cafeImagesDailyRef.off();
    cafeImagesDate = dateKey;
    cafeImagesDailyRef = db.ref(`si-cafe-images/daily/${dateKey}`);
    cafeImagesDailyRef.on('value', snap => {
      dailyImages = snap.val() || {};
      cafeImages = { ...weeklyImages, ...dailyImages };
      renderLunchOpts();
    });
  }
}

function initLunchDay() {
  if (lunchRef) lunchRef.off();
  lunchRef = db.ref(`si-lunch/${getLunchDateKey()}`);
  lunchRef.on('value', snap => {
    const val = snap.val() || {};
    lunchTimestamps = val._ts || {};
    lunchChoices = {};
    Object.entries(val).forEach(([k, v]) => {
      if (k !== '_ts') lunchChoices[k] = v;
    });
    renderLunchNameGrid();
    renderLunchResult();
    const noteEl = document.getElementById('lunchNote');
    if (!(noteEl && document.activeElement === noteEl)) renderLunchOpts();
  });
}

// 선택값 + 타임스탬프 동시 저장 (입력 순서 추적)
function setLunchChoice(name, value) {
  const updates = {};
  updates[name] = value !== null ? value : null;
  updates[`_ts/${name}`] = value !== null ? Date.now() : null;
  lunchRef.update(updates);
}

function renderLunchNameGrid() {
  const allNames = [...getPeopleOrdered(), ...lunchExtraNames.filter(n => !PEOPLE.includes(n))];
  document.getElementById('lunchNameGrid').innerHTML = allNames.map(n => {
    const isExtra = !PEOPLE.includes(n);
    const choice = lunchChoices[n];
    const base   = getChoiceBase(choice);
    const note   = getChoiceNote(choice);
    const label  = base === '오늘은 여기 어때요?' ? (note || '여기어때요?') : base;
    const cls = ['name-btn', n === lunchSelectedName ? 'selected' : '', base ? 'ordered' : ''].join(' ');
    const meLabel = (!base && n === getMyName()) ? '<span class="ordered-label" style="opacity:.6">나</span>' : '';
    const delBtn = isExtra ? `<span class="name-btn-del" onclick="event.stopPropagation();deleteLunchExtraName('${n}')">×</span>` : '';
    return `<button class="${cls}" onclick="pickLunchName('${n}')">
      ${n}
      ${base ? `<span class="ordered-label">${label}</span>` : meLabel}${delBtn}
    </button>`;
  }).join('');
}

function pickLunchName(n) {
  lunchHereMode = false;
  lunchSelectedName = n;
  saveMyName(n);
  const inp = document.getElementById('lunchNameDirectInput');
  const ph  = document.getElementById('lunchNameDirectPh');
  if (inp) inp.value = '';
  if (ph)  ph.innerHTML = '직접<br>입력';
  renderLunchNameGrid();
  renderLunchOpts();
}

function applyLunchNameDirectInput() {
  const inp = document.getElementById('lunchNameDirectInput');
  const val = inp ? inp.value.trim() : '';
  if (!val) return;
  if (!PEOPLE.includes(val) && !lunchExtraNames.includes(val)) lunchExtraNames.push(val);
  lunchSelectedName = val;
  saveMyName(val);
  if (inp) inp.value = '';
  renderLunchNameGrid();
  renderLunchOpts();
}

function deleteLunchExtraName(name) {
  const idx = lunchExtraNames.indexOf(name);
  if (idx !== -1) lunchExtraNames.splice(idx, 1);
  if (lunchSelectedName === name) lunchSelectedName = null;
  // Firebase 점심 선택에서도 제거
  if (lunchRef) setLunchChoice(name, null);
  renderLunchNameGrid();
  renderLunchOpts();
}

function renderLunchOpts() {
  const current     = lunchChoices[lunchSelectedName];
  const currentBase = getChoiceBase(current);
  const currentNote = getChoiceNote(current);

  let html = '';
  LUNCH_OPTIONS.forEach(opt => {
    const isFull = opt === '오늘은 여기 어때요?';
    const isOn   = opt === '오늘은 여기 어때요?'
      ? !lunchJoinMode && (currentBase === opt || lunchHereMode)
      : currentBase === opt;

    if (IMAGE_OPTS.has(opt)) {
      // 이미지 첨부 가능한 버튼 (이리오너라 / 굿모닝 / 가톨릭회관)
      const imgData = cafeImages[opt];
      html += `<div class="lunch-opt-btn lunch-opt-img-btn ${isOn ? 'on' : ''}" onclick="selectLunch('${opt}')">
        <div class="opt-img-area">
          ${imgData
            ? `<img src="${imgData}" class="opt-img" alt="${opt}">`
            : `<span class="opt-img-icon"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>`}
        </div>
        ${imgData ? `<button class="opt-view-btn" onclick="event.stopPropagation();viewImage('${opt}')">🔍 크게보기</button>` : ''}
        <span class="opt-name">${opt}</span>
        <button class="opt-img-action-btn" onclick="event.stopPropagation();openImageMenu('${opt}',event)">${imgData ? '✎' : '+'}</button>
      </div>`;
    } else if (isFull) {
      if (isOn) {
        html += `<div class="lunch-opt-btn lunch-opt-here on">
          <span class="lunch-here-label" onclick="selectLunch('오늘은 여기 어때요?')">오늘은 여기 어때요?</span>
          <div class="lunch-here-input-row">
            <input type="text" id="lunchNote" class="lunch-here-input"
              placeholder="직접 입력"
              value="${currentNote.replace(/"/g, '&quot;')}"
              onkeydown="if(event.key==='Enter')saveLunchNote()"
              onclick="event.stopPropagation()">
            <button class="lunch-here-submit" onclick="event.stopPropagation();saveLunchNote()">입력</button>
          </div>
        </div>`;
      } else {
        html += `<button class="lunch-opt-btn lunch-opt-here" onclick="selectLunch('오늘은 여기 어때요?')">오늘은 여기 어때요?</button>`;
      }
    } else {
      html += `<button class="lunch-opt-btn ${isOn ? 'on' : ''}" onclick="selectLunch('${opt}')">${opt}</button>`;
    }
  });

  document.getElementById('lunchOpts').innerHTML = html;

  // 새로 렌더링 후 입력창에 포커스
  if (currentBase === '오늘은 여기 어때요?') {
    const noteEl = document.getElementById('lunchNote');
    if (noteEl && !currentNote) noteEl.focus();
  }
}

function selectLunch(opt) {
  if (!lunchSelectedName) { toast('이름을 먼저 선택해주세요'); return; }
  const current     = lunchChoices[lunchSelectedName];
  const currentBase = getChoiceBase(current);

  if (opt === '오늘은 여기 어때요?') {
    if (currentBase === '오늘은 여기 어때요?') {
      // 저장된 선택 취소
      lunchHereMode = false;
      setLunchChoice(lunchSelectedName, null);
    } else if (lunchHereMode) {
      // 입력 대기 중 다시 누르면 취소
      lunchHereMode = false;
      renderLunchOpts();
    } else {
      // 텍스트 입력 모드 진입 (Firebase 저장 안 함)
      lunchHereMode = true;
      renderLunchOpts();
      setTimeout(() => { const el = document.getElementById('lunchNote'); if (el) el.focus(); }, 50);
    }
    return;
  }

  // 다른 옵션 선택 시 여기어때요 대기 상태 초기화
  lunchHereMode = false;
  setLunchChoice(lunchSelectedName, currentBase === opt ? null : opt);
}

function cancelLunchChoice(name) {
  setLunchChoice(name, null);
}

function joinLunchOpt(opt) {
  if (!lunchSelectedName) { toast('이름을 먼저 선택해주세요'); return; }
  lunchJoinMode = true;
  selectLunch(opt);
  lunchJoinMode = false;
}

function joinLunch(note) {
  if (!lunchSelectedName) { toast('이름을 먼저 선택해주세요'); return; }
  const value = (note && note.trim()) ? `오늘은 여기 어때요?|${note}` : '오늘은 여기 어때요?';
  lunchJoinMode = true;
  setLunchChoice(lunchSelectedName, value);
  lunchJoinMode = false;
}

function saveLunchNote() {
  if (!lunchSelectedName) return;
  const noteEl = document.getElementById('lunchNote');
  if (!noteEl) return;
  const note = noteEl.value.trim();
  if (!note) { toast('어디 가고 싶은지 입력해주세요'); noteEl.focus(); return; }
  lunchHereMode = false;
  setLunchChoice(lunchSelectedName, `오늘은 여기 어때요?|${note}`);
}

// ── 카페 이미지 관리 ───────────────────────
function openImageMenu(opt, e) {
  currentImageOpt = opt;
  const menu = document.getElementById('imgMenu');
  const delBtn = document.getElementById('imgMenuDelete');
  delBtn.style.display = cafeImages[opt] ? 'block' : 'none';

  // 팝업 위치 계산
  const rect = e.currentTarget.getBoundingClientRect();
  const menuW = 170;
  let left = rect.left;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  menu.style.left = left + 'px';
  menu.style.top  = (rect.bottom + 6) + 'px';
  menu.style.display = 'block';

  setTimeout(() => document.addEventListener('click', closeImageMenu, { once: true }), 0);
}

function closeImageMenu() {
  document.getElementById('imgMenu').style.display = 'none';
}

async function pasteFromClipboard() {
  closeImageMenu();
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      const imgType = item.types.find(t => t.startsWith('image/'));
      if (imgType) {
        const blob = await item.getType(imgType);
        const reader = new FileReader();
        reader.onload = async ev => {
          const compressed = await compressImage(ev.target.result, 800, 600, 0.75);
          db.ref(getCafeImagePath(currentImageOpt)).set(compressed);
          toast('이미지가 등록됐어요!');
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
    toast('클립보드에 이미지가 없어요');
  } catch(err) {
    toast('클립보드 접근 권한을 허용해주세요');
  }
}

function triggerFileInput() {
  closeImageMenu();
  document.getElementById('imgFileInput').click();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const compressed = await compressImage(ev.target.result, 800, 600, 0.75);
    db.ref(getCafeImagePath(currentImageOpt)).set(compressed);
    toast('이미지가 등록됐어요!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeCurrentImage() {
  closeImageMenu();
  db.ref(getCafeImagePath(currentImageOpt)).remove();
  toast('이미지를 삭제했어요');
}

function compressImage(dataURL, maxW, maxH, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
      const w = Math.round(img.width  * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataURL;
  });
}

function renderLunchResult() {
  const groups = {};
  LUNCH_OPTIONS.forEach(opt => { groups[opt] = []; });
  const personNotes = {};

  const allLunchPeople = [...PEOPLE, ...lunchExtraNames.filter(n => !PEOPLE.includes(n))];
  allLunchPeople.forEach(n => {
    const c    = lunchChoices[n];
    const base = getChoiceBase(c);
    const note = getChoiceNote(c);
    if (base && groups[base] !== undefined) {
      groups[base].push(n);
      if (note) personNotes[n] = note;
    }
  });

  const el = document.getElementById('lunchResult');
  const rowItems = []; // { ts, html }

  // 그룹 내 최소 타임스탬프 계산 (입력 순서 기준)
  function minTs(names) {
    const t = names.reduce((m, n) => {
      const ts = lunchTimestamps[n];
      return ts ? Math.min(m, ts) : m;
    }, Number.MAX_SAFE_INTEGER);
    return t;
  }

  [...LUNCH_OPTIONS].forEach(opt => {
    if (!groups[opt] || groups[opt].length === 0) return;

    if (opt === '오늘은 여기 어때요?') {
      // 식당명별로 독립 최상위 행으로 분리
      const noteGroups = {};
      groups[opt].forEach(n => {
        const note = personNotes[n] || '';
        if (!noteGroups[note]) noteGroups[note] = [];
        noteGroups[note].push(n);
      });
      Object.entries(noteGroups).forEach(([note, names]) => {
        const safeNote = note.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const label = note || '오늘은 여기 어때요?';
        const tags = names.map(n =>
          `<span class="lunch-name-tag">${n}<button onclick="cancelLunchChoice('${n}')">×</button></span>`
        ).join('');
        rowItems.push({
          ts: minTs(names),
          html: `
            <div class="lunch-result-row">
              <div class="lunch-result-label">
                <span>${label}</span>
                <span class="lunch-count">${names.length}명</span>
                <button class="lunch-join-btn" style="margin-left:auto" onclick="joinLunch('${safeNote}')">함께해요</button>
              </div>
              <div class="lunch-result-names">${tags}</div>
            </div>`
        });
      });
    } else {
      const nameTags = groups[opt].map(n => {
        const note = personNotes[n] ? `(${personNotes[n]})` : '';
        return `<span class="lunch-name-tag">${n}${note}<button onclick="cancelLunchChoice('${n}')">×</button></span>`;
      }).join('');
      const JOIN_TEXT = { '이리오너라':'함께해요', '굿모닝':'함께해요', '가톨릭회관':'함께해요', '도시락':'저도요', '약속':'저도요', '연차':'저도요' };
      const joinText = JOIN_TEXT[opt];
      const safeOpt = encodeURIComponent(opt);
      rowItems.push({
        ts: minTs(groups[opt]),
        html: `
          <div class="lunch-result-row">
            <div class="lunch-result-label">
              <span>${opt}</span>
              <span class="lunch-count">${groups[opt].length}명</span>
              ${joinText ? `<button class="lunch-join-btn" style="margin-left:auto" onclick="joinLunchOpt(decodeURIComponent('${safeOpt}'))">${joinText}</button>` : ''}
            </div>
            <div class="lunch-result-names">${nameTags}</div>
          </div>`
      });
    }
  });

  // 입력 시간 오름차순 정렬 (타임스탬프 없는 항목은 마지막)
  rowItems.sort((a, b) => a.ts - b.ts);

  el.innerHTML = rowItems.map(r => r.html).join('') || '<div class="empty">아직 선택한 사람이 없어요</div>';
}
// ───────────────────────────────────────────

// ── 과거 주문내역 ──────────────────────────
let historyOpen = false;
let historyData = {}; // 로드된 데이터 캐시

function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('histArrow').className = 'arrow' + (historyOpen ? ' open' : '');
  const list = document.getElementById('historyList');
  list.style.display = historyOpen ? 'block' : 'none';
  if (historyOpen) loadHistory();
}

function loadHistory() {
  historyRef.orderByKey().limitToLast(30).once('value', snap => {
    const val = snap.val();
    const list = document.getElementById('historyList');
    if (!val) { list.innerHTML = '<div class="empty">조회된 내역이 없어요</div>'; return; }
    historyData = val;
    const entries = Object.entries(val).reverse(); // 최신순
    list.innerHTML = entries.map(([key]) => {
      const entry = historyData[key];
      return `<div class="history-entry">
        <div class="history-header" onclick="toggleHistoryEntry('${key}')">
          <span class="history-date">${entry.date}</span>
          <span class="history-arrow" id="ha-${key}">▼</span>
        </div>
        <div class="history-body" id="hb-${key}" style="display:none"></div>
      </div>`;
    }).join('');
  });
}

function toggleHistoryEntry(key) {
  const body  = document.getElementById(`hb-${key}`);
  const arrow = document.getElementById(`ha-${key}`);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.className = 'history-arrow' + (isOpen ? '' : ' open');

  if (!isOpen && !body.dataset.loaded) {
    const entry = historyData[key];
    const orderRows = entry.orders.map(o => {
      let line = o.drink;
      if (o.opts) line += ` (${o.opts})`;
      line += ` ×${o.names.length}`;
      return `<div class="history-order">${line}</div>
              <div class="history-names">→ ${o.names.join(', ')}</div>`;
    }).join('');
    body.innerHTML = orderRows + `<button class="btn-copy-hist" onclick="copyHistory('${key}')">📋 복사</button>`;
    body.dataset.loaded = '1';
  }
}

function copyHistory(key) {
  const entry = historyData[key];
  if (!entry) return;

  const menuOrder = {};
  let idx = 0;
  Object.values(getMenu()).filter(Array.isArray).forEach(items =>
    items.forEach(item => { menuOrder[item.name] = idx++; })
  );
  const sorted = [...entry.orders].sort((a, b) =>
    (menuOrder[a.drink] ?? 999) - (menuOrder[b.drink] ?? 999)
  );

  const lines = [];
  let prevDrink = null;
  sorted.forEach(o => {
    if (prevDrink !== null && prevDrink !== o.drink) lines.push('');
    let line = o.drink;
    if (o.opts) line += ` (${o.opts})`;
    line += ` ×${o.names.length}  ${o.names.join(', ')}`;
    lines.push(line);
    prevDrink = o.drink;
  });

  const text = `[${entry.date}]\n` + lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('복사됐어요!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
// ────────────────────────────────────────────

// 여기어때요 입력 대기 중 바깥 클릭 시 취소
document.addEventListener('click', function(e) {
  if (!lunchHereMode) return;
  if (e.target.closest('.lunch-opt-here')) return;
  lunchHereMode = false;
  renderLunchOpts();
});

init();

</script>
