<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 커피 주문</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #8B1A1A;
      --bg: #fdf5f0;
      --card: #ffffff;
      --border: #e8d5c8;
      --text: #2c1a1a;
      --muted: #8a6a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    header h1 { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    header p { font-size: 11px; color: #b08080; margin-top: 2px; }

    .container { max-width: 480px; margin: 0 auto; padding: 14px 14px 0; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Name input */
    .name-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }
    .name-btn {
      padding: 8px 4px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: #fafafa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      text-align: center;
    }
    .name-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff5f0; }
    .name-btn.selected { background: var(--primary); border-color: var(--primary); color: white; }
    .name-btn.ordered {
      border-color: #c0786a;
      background: #fff0ec;
      color: var(--primary);
      position: relative;
    }
    .name-btn.ordered::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 9px;
      font-weight: 900;
      color: var(--primary);
    }
    .name-btn.selected.ordered::after { color: rgba(255,255,255,0.7); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .tab.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* Menu items */
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s;
      margin: 0 -10px;
    }
    .menu-item:hover { background: #fdf0eb; }
    .menu-item.selected { background: #fbe8e0; }
    .item-left { flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .star-icon { color: var(--primary); font-size: 11px; }
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 9px;
      background: #f0e4dc;
      color: var(--muted);
      font-weight: 600;
    }
    .item-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .item-price { font-size: 14px; font-weight: 700; color: var(--primary); white-space: nowrap; }

    /* Options */
    .opt-group { margin-bottom: 14px; }
    .opt-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 7px; text-transform: uppercase; }
    .opt-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .opt-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .opt-btn.on { background: var(--primary); border-color: var(--primary); color: white; }
    .opt-btn.extra.on { background: #5c3d2e; border-color: #5c3d2e; color: white; }

    /* Buttons */
    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.88; }

    /* Order list */
    .order-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid #f0e8e0;
      gap: 8px;
    }
    .order-item:last-child { border-bottom: none; }
    .order-who { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .order-drink { font-size: 14px; font-weight: 500; }
    .order-opts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .order-right { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .order-price { font-size: 14px; font-weight: 700; }
    .btn-del {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 17px;
      padding: 0 0 0 4px;
      line-height: 1;
      transition: color 0.12s;
    }
    .btn-del:hover { color: var(--primary); }

    .name-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .name-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px 3px 10px;
      background: #f5e8e0;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
    }
    .name-tag button {
      background: none;
      border: none;
      color: #c0a090;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      margin-left: 1px;
    }
    .name-tag button:hover { color: var(--primary); }
    .order-count {
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: var(--primary);
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 4px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 6px;
      border-top: 2px solid var(--border);
      font-weight: 700;
      font-size: 16px;
    }
    .total-count { font-size: 12px; color: var(--muted); font-weight: 400; }

    .btn-copy {
      width: 100%;
      padding: 13px;
      background: #4a3728;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-reset {
      width: 100%;
      padding: 10px;
      background: none;
      color: #b08080;
      border: 1.5px solid #e8d5c8;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--primary); color: var(--primary); }
    .conn-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 4px;
      vertical-align: middle;
    }
    .conn-dot.on { background: #4caf50; }

    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 18px 0; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(44,26,26,0.88);
      color: white;
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>☕ 팀 커피 주문 취합</h1>
  <p>Since 2018 · 소소 &nbsp;|&nbsp; <span class="conn-dot" id="connDot"></span><span id="connStatus">연결 중...</span></p>
</header>

<div class="container">

  <!-- 이름 -->
  <div class="card">
    <div class="card-title">주문자 선택</div>
    <div class="name-grid" id="nameGrid"></div>
  </div>

  <!-- 메뉴 -->
  <div class="card">
    <div class="card-title">메뉴 선택</div>
    <div class="tabs" id="tabs"></div>
    <div id="menuList"></div>
  </div>

  <!-- 옵션 -->
  <div class="card" id="optCard" style="display:none">
    <div class="card-title">옵션</div>
    <div id="optGroups"></div>
    <button class="btn-add" onclick="addOrder()">주문 추가하기</button>
  </div>

  <!-- 주문 목록 -->
  <div class="card">
    <div class="card-title">주문 목록</div>
    <div id="orderList"><div class="empty">아직 주문이 없어요</div></div>
    <div id="totalRow" style="display:none" class="total-row">
      <span>합계 <span class="total-count" id="totalCount"></span></span>
      <span id="totalAmt"></span>
    </div>
    <button class="btn-copy" id="btnCopy" style="display:none" onclick="copyOrders()">📋 주문 내역 복사하기</button>
    <button class="btn-reset" id="btnReset" style="display:none" onclick="resetOrders()">🗑️ 주문 초기화</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const MENU = {
  "COFFEE": [
    { name:"아메리카노",     price:2500, note:"S: 1,500 / L: 3,500", hasSize:true, hasBean:true },
    { name:"카페라떼",       price:3300, hasBean:true },
    { name:"수제 바닐라빈 라떼", price:4000, star:true },
    { name:"연유 라떼",      price:3800 },
    { name:"헤이즐넛 라떼",  price:3800 },
    { name:"시나몬 라떼",    price:3800, tempOnly:"HOT" },
    { name:"코코넛 라떼",    price:3800, tempOnly:"ICE" },
    { name:"소소 라떼",      price:3800 },
  ],
  "COLD BREW": [
    { name:"콜드 브루",      price:3300 },
    { name:"콜드 브루 라떼", price:3800 },
    { name:"연유 콜드 브루", price:4300 },
  ],
  "SIGNATURE": [
    { name:"소소슈페너",              price:4000, star:true, tempOnly:"ICE", note:"라떼 변경 +600" },
    { name:"칼리바우트 초코 라떼",    price:5000, star:true },
    { name:"칼리바우트 카페 모카",    price:5000 },
    { name:"딸기 한사바리 라떼",      price:4500, tempOnly:"ICE" },
  ],
  "ADE": [
    { name:"레몬 에이드",             price:4000 },
    { name:"자몽 에이드",             price:4000 },
    { name:"청포도 에이드",           price:4000 },
    { name:"자두 자몽 히비스커스 에이드", price:4000 },
  ],
  "NON COFFEE": [
    { name:"토피넛 라떼",   price:3800 },
    { name:"그린티 라떼",   price:3800 },
    { name:"미숫가루 라떼", price:3800, tempOnly:"ICE" },
    { name:"얼그레이 밀크티", price:4000, star:true },
  ],
  "TEA": [
    { name:"얼그레이 복숭아 아이스 티",    price:3000 },
    { name:"자두 자몽 히비스커스 티",      price:3500 },
    { name:"얼그레이",                     price:3000 },
    { name:"캐모마일",                     price:3000 },
    { name:"페퍼민트",                     price:3000 },
    { name:"루이보스 카라멜 티",           price:3000 },
  ],
};

const EXTRAS = [
  { label:"샷 추가",      price:500 },
  { label:"디카페인 변경", price:700 },
  { label:"오트밀 변경",  price:1000 },
];

const TEMP_FREE = new Set(["COLD BREW","ADE","TEA"]);

const PEOPLE = [
  '유낙근','이병호','신승국','이경선',
  '강제규','김샛별','신창근','박혜영',
  '이영실','윤주열','주승환','유석민','지서영',
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 🔥 Firebase 설정
// console.firebase.google.com → 프로젝트 → 앱 추가(웹) → 구성 복사 후 붙여넣기
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const firebaseConfig = {
  apiKey:            "AIzaSyAc6ioA_LodQkL9uWUzO9OctJ_kqUBis_c",
  authDomain:        "si-coffee-order.firebaseapp.com",
  databaseURL:       "https://si-coffee-order-default-rtdb.firebaseio.com",
  projectId:         "si-coffee-order",
  storageBucket:     "si-coffee-order.firebasestorage.app",
  messagingSenderId: "16953693047",
  appId:             "1:16953693047:web:6223ee9e69e38e53dc4772",
};

firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const orderRef = db.ref('si-coffee/orders');

// 연결 상태 표시
db.ref('.info/connected').on('value', snap => {
  const on = snap.val();
  document.getElementById('connDot').className    = 'conn-dot' + (on ? ' on' : '');
  document.getElementById('connStatus').textContent = on ? '실시간 연결됨' : '오프라인';
});

// ─── localStorage 캐시 (오프라인 대비) ───
const LS_KEY = 'si-coffee-orders';

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(orders)); } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { orders = JSON.parse(raw); renderOrders(); }
  } catch(e) {}
}

function clearLocal() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}
// ─────────────────────────────────────────

// 다른 기기 변경사항 실시간 수신 (Firebase → localStorage 동기화)
orderRef.on('value', snap => {
  const val = snap.val();
  try { orders = val && val.json ? JSON.parse(val.json) : []; }
  catch(e) { orders = []; }
  saveLocal(); // Firebase 데이터를 로컬에도 캐시
  renderOrders();
});

function saveOrders() {
  saveLocal(); // 로컬 즉시 저장
  if (!orders.length) { orderRef.remove(); return; }
  orderRef.set({ json: JSON.stringify(orders), ts: Date.now() });
}

function resetOrders() {
  if (!confirm('주문 내역을 전체 초기화할까요?')) return;
  orders = [];
  clearLocal();
  orderRef.remove();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const cats = Object.keys(MENU);
let cat = cats[0];
let selectedName = null;
let sel = null, temp = null, size = null, bean = null, extras = [];
let orders = [];

function init() {
  loadLocal();       // Firebase 응답 전 localStorage 데이터를 즉시 표시
  renderNameGrid();
  renderTabs();
  renderMenu();
}

function renderNameGrid() {
  document.getElementById('nameGrid').innerHTML = PEOPLE.map(n => {
    const ordered = orders.some(o => o.names.includes(n));
    const cls = [n === selectedName ? 'selected' : '', ordered ? 'ordered' : ''].join(' ');
    return `<button class="name-btn ${cls}" onclick="pickName('${n}')">${n}</button>`;
  }).join('');
}

function pickName(n) {
  selectedName = n;
  renderNameGrid();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = cats.map(c =>
    `<button class="tab ${c===cat?'active':''}" onclick="pickCat('${c}')">${c}</button>`
  ).join('');
}

function pickCat(c) {
  cat = c; sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  renderTabs(); renderMenu();
}

function renderMenu() {
  document.getElementById('menuList').innerHTML = MENU[cat].map((item, i) => `
    <div class="menu-item ${sel===item?'selected':''}" onclick="pickItem(${i})">
      <div class="item-left">
        <div class="item-name">
          ${item.star?'<span class="star-icon">★</span>':''}
          ${item.name}
          ${item.tempOnly?`<span class="badge">Only ${item.tempOnly}</span>`:''}
        </div>
        ${item.note?`<div class="item-note">${item.note}</div>`:''}
      </div>
      <div class="item-price">${item.price.toLocaleString()}원</div>
    </div>
  `).join('');
}

function pickItem(i) {
  sel = MENU[cat][i];
  temp = sel.tempOnly ?? null;
  size = sel.hasSize ? 'M' : null;
  bean = sel.hasBean ? 'sig' : null;
  extras = [];
  renderMenu();
  renderOpts();
  document.getElementById('optCard').style.display = 'block';
  document.getElementById('optCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderOpts() {
  let html = '';

  // Temperature
  if (!sel.tempOnly && !TEMP_FREE.has(cat)) {
    html += `<div class="opt-group">
      <div class="opt-label">온도</div>
      <div class="opt-btns">
        <button class="opt-btn ${temp==='ICE'?'on':''}" onclick="setTemp('ICE')">🧊 ICE</button>
        <button class="opt-btn ${temp==='HOT'?'on':''}" onclick="setTemp('HOT')">☕ HOT</button>
      </div></div>`;
  }

  // Size (아메리카노)
  if (sel.hasSize) {
    const prices = {S:1500, M:2500, L:3500};
    html += `<div class="opt-group">
      <div class="opt-label">사이즈</div>
      <div class="opt-btns">
        ${['S','M','L'].map(s =>
          `<button class="opt-btn ${size===s?'on':''}" onclick="setSize('${s}')">
            ${s} (${prices[s].toLocaleString()}원)
          </button>`
        ).join('')}
      </div></div>`;
  }

  // Bean
  if (sel.hasBean) {
    html += `<div class="opt-group">
      <div class="opt-label">원두 선택</div>
      <div class="opt-btns">
        <button class="opt-btn ${bean==='sig'?'on':''}" onclick="setBean('sig')">소소 시그니처</button>
        <button class="opt-btn ${bean==='dark'?'on':''}" onclick="setBean('dark')">프리미엄 다크</button>
      </div></div>`;
  }

  // Extras
  html += `<div class="opt-group">
    <div class="opt-label">추가 옵션</div>
    <div class="opt-btns">
      ${EXTRAS.map((e,i) =>
        `<button class="opt-btn extra ${extras.includes(i)?'on':''}" onclick="toggleExtra(${i})">
          ${e.label} +${e.price.toLocaleString()}
        </button>`
      ).join('')}
    </div></div>`;

  document.getElementById('optGroups').innerHTML = html;
}

function setTemp(t) { temp = t; renderOpts(); }
function setSize(s) { size = s; renderOpts(); }
function setBean(b) { bean = b; renderOpts(); }
function toggleExtra(i) {
  extras = extras.includes(i) ? extras.filter(x=>x!==i) : [...extras, i];
  renderOpts();
}

function calcPrice() {
  let p = sel.price;
  if (size === 'S') p = 1500;
  if (size === 'L') p = 3500;
  extras.forEach(i => { p += EXTRAS[i].price; });
  return p;
}

function buildOptsLabel() {
  const parts = [];
  if (temp) parts.push(temp);
  if (size && size !== 'M') parts.push(size + '사이즈');
  if (bean === 'dark') parts.push('다크 블렌드');
  extras.forEach(i => parts.push(EXTRAS[i].label));
  return parts.join(' · ');
}

function addOrder() {
  const name = selectedName;
  if (!name) { toast('주문자를 선택해주세요'); return; }
  if (!sel)  { toast('메뉴를 선택해주세요'); return; }
  if (!sel.tempOnly && !TEMP_FREE.has(cat) && !temp) { toast('온도를 선택해주세요'); return; }

  const opts = buildOptsLabel();
  const key = sel.name + '|' + opts;
  const existing = orders.find(o => o.key === key);

  if (existing) {
    existing.names.push(name);
  } else {
    orders.push({ key, drink: sel.name, opts, unitPrice: calcPrice(), names: [name] });
  }

  saveOrders(); // Firebase 저장 → onValue가 renderOrders() 처리

  sel = null; temp = null; size = null; bean = null; extras = [];
  document.getElementById('optCard').style.display = 'none';
  renderMenu();
  toast(`${name}님 주문 추가 완료!`);
}

function removeName(key, nameIdx) {
  const group = orders.find(o => o.key === key);
  if (!group) return;
  group.names.splice(nameIdx, 1);
  if (group.names.length === 0) orders = orders.filter(o => o.key !== key);
  saveOrders(); // Firebase 저장 → onValue가 renderOrders() 처리
}

function renderOrders() {
  const el = document.getElementById('orderList');
  if (!orders.length) {
    el.innerHTML = '<div class="empty">아직 주문이 없어요</div>';
    document.getElementById('totalRow').style.display = 'none';
    document.getElementById('btnCopy').style.display = 'none';
    document.getElementById('btnReset').style.display = 'none';
    renderNameGrid();
    return;
  }

  el.innerHTML = orders.map(o => {
    const safeKey = encodeURIComponent(o.key);
    const nameTags = o.names.map((n, i) =>
      `<span class="name-tag">${n}<button onclick="removeName(decodeURIComponent('${safeKey}'),${i})">×</button></span>`
    ).join('');
    const subtotal = (o.unitPrice * o.names.length).toLocaleString();
    return `
      <div class="order-item">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:4px">
            <div class="order-drink">${o.drink}</div>
            ${o.names.length > 1 ? `<span class="order-count">×${o.names.length}</span>` : ''}
          </div>
          ${o.opts ? `<div class="order-opts">${o.opts}</div>` : ''}
          <div class="name-tags">${nameTags}</div>
        </div>
        <div class="order-price" style="align-self:flex-start;padding-top:2px">${subtotal}원</div>
      </div>`;
  }).join('');

  const totalNames = orders.reduce((s,o) => s + o.names.length, 0);
  const total = orders.reduce((s,o) => s + o.unitPrice * o.names.length, 0);
  document.getElementById('totalCount').textContent = `${totalNames}명`;
  document.getElementById('totalAmt').textContent = total.toLocaleString() + '원';
  document.getElementById('totalRow').style.display = 'flex';
  document.getElementById('btnCopy').style.display = 'block';
  document.getElementById('btnReset').style.display = 'block';
  renderNameGrid();
}

function copyOrders() {
  const totalNames = orders.reduce((s,o) => s + o.names.length, 0);
  const total = orders.reduce((s,o) => s + o.unitPrice * o.names.length, 0);
  const lines = [
    `☕ 커피 주문 내역 (${totalNames}명)`,
    '─'.repeat(28),
    ...orders.map((o, i) => {
      const subtotal = (o.unitPrice * o.names.length).toLocaleString();
      let line = `${i+1}. ${o.drink}`;
      if (o.opts) line += ` (${o.opts})`;
      line += `  ×${o.names.length}  ${subtotal}원`;
      line += `\n     → ${o.names.join(', ')}`;
      return line;
    }),
    '─'.repeat(28),
    `합계: ${total.toLocaleString()}원`,
  ];
  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('클립보드에 복사됐어요!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('클립보드에 복사됐어요!');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
